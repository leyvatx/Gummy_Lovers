services:
  - type: web
    name: gummy-lovers-api
    runtime: python
    plan: free
    branch: main
    buildCommand: bash scripts/render-build.sh
    startCommand: bash scripts/render-start.sh
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_USE_HTTPS
        value: "1"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: "^https://.*\\.vercel\\.app$,^https://.*\\.netlify\\.app$"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: GUMMY_EFRAIN_PASSWORD
        sync: false
      - key: GUMMY_ERIKA_PASSWORD
        sync: false
